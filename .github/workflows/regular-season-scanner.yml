name: Regular Season Breakout Scanner

on:
  # Run weekly during the regular season (Apr-Sep)
  schedule:
    - cron: '0 12 * 4-9 1'  # Every Monday at noon UTC, Apr-Sep
  # Allow manual runs
  workflow_dispatch:
    inputs:
      min_bbe:
        description: 'Minimum batted ball events to include a player'
        required: false
        default: '21'
      scan_end_date:
        description: 'End date for scan data (YYYY-MM-DD, blank for today)'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-4.3.2-packages-${{ runner.os }}-${{ hashFiles('early_season_scanner.R') }}
          restore-keys: |
            r-4.3.2-packages-${{ runner.os }}-

      - name: Install R packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c(
            "dplyr", "tidyr", "purrr", "stringr", "lubridate",
            "readr", "tibble", "gbm", "httr", "jsonlite",
            "remotes"
          ), repos = "https://cloud.r-project.org")
          remotes::install_github("saberpowers/sabRmetrics")
        shell: Rscript {0}

      - name: Create output directories
        run: |
          mkdir -p output cache

      - name: Train the breakout model
        run: Rscript hr_bbe_analysis.R
        shell: bash

      - name: Run early season breakout scanner
        env:
          INPUT_SCAN_END_DATE: ${{ github.event.inputs.scan_end_date }}
          INPUT_MIN_BBE: ${{ github.event.inputs.min_bbe }}
        run: |
          # Apply overrides via environment variables (avoids eval/parse injection)
          end_date <- Sys.getenv("INPUT_SCAN_END_DATE", "")
          if (nchar(end_date) > 0) {
            SCAN_END <<- as.Date(end_date)
          }

          min_bbe_str <- Sys.getenv("INPUT_MIN_BBE", "21")
          min_bbe_val <- suppressWarnings(as.integer(min_bbe_str))
          if (!is.na(min_bbe_val)) {
            MIN_BBE_SCAN <<- min_bbe_val
          }

          source("early_season_scanner.R")
        shell: Rscript {0}

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: regular-season-breakout-scan
          path: |
            output/early_scan_*.csv
            output/early_scan_report_*.md
          retention-days: 90

      - name: Write job summary
        run: |
          REPORT=$(ls -t output/early_scan_report_*.md 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report generated." >> "$GITHUB_STEP_SUMMARY"
          fi
