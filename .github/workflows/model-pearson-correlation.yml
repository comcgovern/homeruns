name: Model Pearson Correlation Analysis

on:
  workflow_dispatch:
    inputs:
      n_iterations:
        description: 'Number of Monte Carlo CV iterations'
        required: false
        default: '100'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-cv-${{ runner.os }}-${{ hashFiles('model_pearson_correlation.R') }}
          restore-keys: |
            r-packages-cv-${{ runner.os }}-
            r-packages-${{ runner.os }}-

      - name: Install R packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c(
            "dplyr", "tidyr", "purrr", "stringr", "lubridate",
            "readr", "tibble", "gbm", "ggplot2",
            "httr", "jsonlite", "remotes"
          ), repos = "https://cloud.r-project.org")
          remotes::install_github("saberpowers/sabRmetrics")
        shell: Rscript {0}

      - name: Create output directories
        run: mkdir -p output/visualizations cache

      - name: Train the breakout model (populates cache)
        run: Rscript hr_bbe_analysis.R
        shell: bash

      - name: Run Pearson correlation analysis
        run: |
          Rscript model_pearson_correlation.R ${{ github.event.inputs.n_iterations }}
        shell: bash

      - name: Upload CSV results
        uses: actions/upload-artifact@v4
        with:
          name: cv-results-csv
          path: |
            output/cv_results_by_bbe_subsample.csv
            output/cv_results_by_bbe_threshold.csv
            output/cv_results_by_pa_threshold.csv
            output/cv_summary.csv
          retention-days: 90

      - name: Upload visualizations
        uses: actions/upload-artifact@v4
        with:
          name: cv-visualizations
          path: output/visualizations/*.png
          retention-days: 90

      - name: Generate job summary
        run: |
          library(readr)

          md <- character()
          add <- function(...) md <<- c(md, paste0(...))

          add("## Model Cross-Validation & Stabilization Analysis")
          add("")
          add("**Monte Carlo iterations:** ${{ github.event.inputs.n_iterations || '100' }}",
              " | **Train/test split:** 70/30",
              " | **Date:** ", Sys.Date())
          add("")

          # --- Overall model performance ---
          if (file.exists("output/cv_summary.csv")) {
            summary <- read_csv("output/cv_summary.csv", show_col_types = FALSE)
            labels <- c(pearson_r = "Pearson r", spearman_r = "Spearman r",
                        rmse = "RMSE", mae = "MAE",
                        directional_acc = "Directional Accuracy",
                        r_squared = "R-squared",
                        top5_precision = "Top-5 Precision",
                        top10_precision = "Top-10 Precision")

            add("### Overall Model Performance (Y2 BBE >= 150)")
            add("")
            add("| Metric | Mean | SD |")
            add("|--------|-----:|---:|")
            for (i in seq_len(nrow(summary))) {
              lbl <- ifelse(summary$metric[i] %in% names(labels),
                            labels[summary$metric[i]], summary$metric[i])
              add(sprintf("| %s | %.4f | %.4f |", lbl, summary$mean[i], summary$sd[i]))
            }
            add("")
          }

          # --- BBE Subsampling ---
          if (file.exists("output/cv_results_by_bbe_subsample.csv")) {
            bbe_sub <- read_csv("output/cv_results_by_bbe_subsample.csv", show_col_types = FALSE)

            add("### BBE Subsampling: Pearson r vs Number of BBE")
            add("")
            add("How many batted ball events does the model need for reliable predictions?")
            add("Features computed from subsampled Y2 BBE; outcome uses full-season actuals.")
            add("")
            add("| BBE | Pearson r | +/- SD | Spearman r | RMSE | Dir. Acc | N players |")
            add("|----:|----------:|-------:|-----------:|-----:|---------:|----------:|")

            show_rows <- bbe_sub[bbe_sub$bbe_level %% 20 == 0 | bbe_sub$bbe_level == 30, ]
            for (i in seq_len(nrow(show_rows))) {
              r <- show_rows[i, ]
              add(sprintf("| %d | %.3f | %.3f | %.3f | %.4f | %.1f%% | %.0f |",
                          r$bbe_level, r$pearson_r_mean, r$pearson_r_sd,
                          r$spearman_r_mean, r$rmse_mean,
                          r$directional_acc_mean * 100, r$n_mean))
            }
            add("")
          }

          # --- BBE Threshold ---
          if (file.exists("output/cv_results_by_bbe_threshold.csv")) {
            bbe_thr <- read_csv("output/cv_results_by_bbe_threshold.csv", show_col_types = FALSE)

            add("### BBE Threshold: Pearson r by Minimum Y2 BBE")
            add("")
            add("| Min BBE | Pearson r | +/- SD | Spearman r | N players |")
            add("|--------:|----------:|-------:|-----------:|----------:|")

            show_rows <- bbe_thr[bbe_thr$threshold %% 25 == 0, ]
            for (i in seq_len(nrow(show_rows))) {
              r <- show_rows[i, ]
              add(sprintf("| %d | %.3f | %.3f | %.3f | %.0f |",
                          r$threshold, r$pearson_r_mean, r$pearson_r_sd,
                          r$spearman_r_mean, r$n_mean))
            }
            add("")
          }

          # --- PA Threshold ---
          if (file.exists("output/cv_results_by_pa_threshold.csv")) {
            pa_thr <- read_csv("output/cv_results_by_pa_threshold.csv", show_col_types = FALSE)

            add("### PA Threshold: Pearson r by Minimum Plate Appearances")
            add("")
            add("| Min PA | Pearson r | +/- SD | Spearman r | N players |")
            add("|-------:|----------:|-------:|-----------:|----------:|")

            for (i in seq_len(nrow(pa_thr))) {
              r <- pa_thr[i, ]
              add(sprintf("| %d | %.3f | %.3f | %.3f | %.0f |",
                          r$threshold, r$pearson_r_mean, r$pearson_r_sd,
                          r$spearman_r_mean, r$n_mean))
            }
            add("")
          }

          add("### Visualizations")
          add("")
          add("Charts are available as downloadable artifacts: **cv-visualizations**")
          add("")
          add("- `pearson_r_vs_bbe_subsample.png` — Stabilization curve (Pearson r vs BBE count)")
          add("- `pearson_r_vs_pa_threshold.png` — Pearson r vs minimum plate appearances")
          add("- `cv_metrics_dashboard.png` — Multi-metric dashboard (Pearson, Spearman, RMSE, Dir. Acc)")
          add("- `cv_actual_vs_predicted.png` — Actual vs predicted scatter plot")

          # Write to GITHUB_STEP_SUMMARY
          summary_file <- Sys.getenv("GITHUB_STEP_SUMMARY", "")
          if (nchar(summary_file) > 0) {
            writeLines(md, summary_file)
          } else {
            cat(paste(md, collapse = "\n"))
          }
        shell: Rscript {0}
